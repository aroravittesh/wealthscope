<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-white">Portfolios</h1>
      <p class="text-slate-400 mt-1">Select a portfolio to manage holdings.</p>
    </div>
  </div>

  <div *ngIf="loading" class="mt-8 space-y-4">
    <div class="bg-slate-800 bg-opacity-50 rounded-xl p-6 border border-slate-700 animate-pulse">
      <div class="h-4 w-48 bg-slate-700 rounded mb-4"></div>
      <div class="h-3 w-full bg-slate-700 rounded mb-3"></div>
      <div class="h-3 w-2/3 bg-slate-700 rounded"></div>
    </div>
    <div class="bg-slate-800 bg-opacity-50 rounded-xl p-6 border border-slate-700 animate-pulse">
      <div class="h-4 w-48 bg-slate-700 rounded mb-4"></div>
      <div class="h-3 w-full bg-slate-700 rounded mb-3"></div>
      <div class="h-3 w-2/3 bg-slate-700 rounded"></div>
    </div>
  </div>

  <div *ngIf="!loading && errorMessage" class="mt-8 bg-red-900/30 border border-red-500/50 rounded-xl p-4 text-red-200">
    {{ errorMessage }}
  </div>

  <div *ngIf="!loading && !errorMessage">
    <div *ngIf="portfolios.length === 0" class="text-center py-12">
      <p class="text-slate-400 mb-4">No portfolios yet</p>
    </div>

    <div *ngIf="portfolios.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6">
      <a
        *ngFor="let portfolio of portfolios"
        [routerLink]="['/portfolio', portfolio.id, 'holdings']"
        class="bg-slate-700 bg-opacity-50 rounded-lg p-4 border border-slate-600 hover:border-blue-500 transition card-shadow premium-card transform hover:scale-105"
      >
        <h3 class="text-white font-semibold text-lg mb-2">{{ portfolio.name }}</h3>
        <p class="text-slate-400 text-sm mb-4">{{ portfolio.description }}</p>
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <span class="text-slate-400 text-sm">Value:</span>
            <span class="text-white font-semibold">${{ (portfolio.totalValue ?? 0).toFixed(2) }}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-400 text-sm">P/L:</span>
            <span class="text-green-400 font-semibold">{{ (portfolio.profitLossPercentage ?? 0).toFixed(2) }}%</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
